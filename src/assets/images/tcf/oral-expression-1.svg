<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b35" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#d63031" stop-opacity="0.9" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="5" flood-color="#000" flood-opacity="0.3" />
    </filter>
    <linearGradient id="micGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#f8f9fa" stop-opacity="0.8" />
    </linearGradient>
  </defs>
  
  <rect width="800" height="400" rx="15" fill="url(#bgGradient)" />
  
  <!-- Decorative circles -->
  <circle cx="100" cy="80" r="60" fill="#ffffff" fill-opacity="0.1" />
  <circle cx="700" cy="320" r="80" fill="#ffffff" fill-opacity="0.1" />
  <circle cx="200" cy="350" r="40" fill="#ffffff" fill-opacity="0.05" />
  <circle cx="600" cy="100" r="50" fill="#ffffff" fill-opacity="0.05" />
  
  <!-- Sound waves -->
  <g transform="translate(500, 150)" fill="none" stroke="#ffffff" stroke-opacity="0.6" stroke-width="3">
    <circle cx="0" cy="0" r="30" />
    <circle cx="0" cy="0" r="50" stroke-opacity="0.4" />
    <circle cx="0" cy="0" r="70" stroke-opacity="0.2" />
  </g>
  
  <!-- Microphone -->
  <g transform="translate(120, 180)" filter="url(#shadow)">
    <!-- Microphone body -->
    <ellipse cx="40" cy="40" rx="25" ry="35" fill="url(#micGradient)" />
    <!-- Microphone grille -->
    <rect x="20" y="15" width="40" height="50" rx="20" fill="none" stroke="#666" stroke-width="2" />
    <line x1="25" y1="25" x2="55" y2="25" stroke="#666" stroke-width="1" />
    <line x1="25" y1="35" x2="55" y2="35" stroke="#666" stroke-width="1" />
    <line x1="25" y1="45" x2="55" y2="45" stroke="#666" stroke-width="1" />
    <line x1="25" y1="55" x2="55" y2="55" stroke="#666" stroke-width="1" />
    <!-- Microphone stand -->
    <rect x="37" y="75" width="6" height="40" fill="#424242" />
    <rect x="30" y="115" width="20" height="8" rx="4" fill="#424242" />
  </g>
  
  <!-- Speech bubble -->
  <g transform="translate(250, 120)" filter="url(#shadow)">
    <ellipse cx="80" cy="40" rx="70" ry="30" fill="#ffffff" fill-opacity="0.9" />
    <polygon points="20,55 35,45 35,65" fill="#ffffff" fill-opacity="0.9" />
    <!-- Text lines in speech bubble -->
    <rect x="30" y="30" width="100" height="3" rx="1.5" fill="#ff6b35" />
    <rect x="30" y="40" width="80" height="3" rx="1.5" fill="#ff6b35" />
    <rect x="30" y="50" width="90" height="3" rx="1.5" fill="#ff6b35" />
  </g>
  
  <!-- Audio waveform visualization -->
  <g transform="translate(450, 200)" fill="#ffffff" fill-opacity="0.7">
    <rect x="0" y="20" width="4" height="20" rx="2" />
    <rect x="8" y="10" width="4" height="40" rx="2" />
    <rect x="16" y="5" width="4" height="50" rx="2" />
    <rect x="24" y="15" width="4" height="30" rx="2" />
    <rect x="32" y="0" width="4" height="60" rx="2" />
    <rect x="40" y="12" width="4" height="36" rx="2" />
    <rect x="48" y="8" width="4" height="44" rx="2" />
    <rect x="56" y="18" width="4" height="24" rx="2" />
    <rect x="64" y="6" width="4" height="48" rx="2" />
    <rect x="72" y="14" width="4" height="32" rx="2" />
  </g>
  
  <!-- Recording indicator -->
  <g transform="translate(650, 80)">
    <circle cx="0" cy="0" r="12" fill="#e74c3c" />
    <text x="0" y="5" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#ffffff">REC</text>
  </g>
  
  <text x="400" y="300" font-family="Arial, sans-serif" font-size="40" font-weight="bold" text-anchor="middle" fill="#ffffff" filter="url(#shadow)">
    TCF CANADA
  </text>
  
  <text x="400" y="340" font-family="Arial, sans-serif" font-size="24" font-weight="normal" text-anchor="middle" fill="#ffffff" filter="url(#shadow)">
    Expression Orale
  </text>
</svg>